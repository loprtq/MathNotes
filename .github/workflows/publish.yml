on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Python and Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install jupyter

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'
          use-public-rspm: true

      - name: Install R packages
        run: |
          install.packages(c("quarto", "pak", "rmarkdown", "knitr", "reticulate", "devtools"))
        shell: Rscript {0}

      - name: Extract R dependencies from .qmd files
        run: Rscript package_dependencies.R

      - name: Install detected R dependencies (with fallback)
        run: |
          # Read extracted packages
          pkgs <- scan("quarto-packages.txt", character(), quiet = TRUE)
          
          if (length(pkgs) > 0) {
            message("Installing ", length(pkgs), " packages...")
            # Try pak first (faster), fallback to install.packages if it fails
            tryCatch({
              pak::pkg_install(pkgs, upgrade = FALSE)
            }, error = function(e) {
              message("pak installation failed, falling back to install.packages...")
              install.packages(pkgs, repos = getOption("repos"))
            })
          } else {
            message("No additional packages to install")
          }
        shell: Rscript {0}

      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@v2

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages